name: 🚀 MERN Auto Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ---------------- CHECKOUT CODE ----------------
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      # ---------------- SSH SETUP ----------------
      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.7.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      # ---------------- BACKEND DEPLOY ----------------
      - name: 🚀 Deploy Backend
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} << 'EOF'
            echo "Pulling backend..."
            cd ~/mernapp/backend

            git pull
            npm install

            echo "Restarting backend with PM2..."
            pm2 restart backend || pm2 start server.js --name backend
            pm2 save
          EOF

      # ---------------- FRONTEND BUILD ----------------
      - name: 🏗 Build Frontend
        run: |
          cd frontend
          npm install
          npm run build

      # ---------------- FRONTEND DEPLOY ----------------
      - name: 📤 Upload Frontend Build
        run: |
          scp -o StrictHostKeyChecking=no -r frontend/build/* ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/frontend/

      # ---------------- NGINX RELOAD ----------------
      - name: 🔄 Reload Nginx
        run: |
          ssh -o StrictHostKeyChecking=no ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} "sudo systemctl reload nginx"
