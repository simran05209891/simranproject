name: 🚀 Auto Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout Code
    - name: 📥 Checkout Code
      uses: actions/checkout@v3

    # 2. Setup SSH
    - name: 🔑 Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    # 3. Deploy Backend via SSH
    - name: 🚀 Deploy Backend
      run: |
        ssh -o StrictHostKeyChecking=no simran@${{ secrets.SERVER_IP }} << 'EOF'
          cd ~/simran.project/backend
          git pull origin main
          npm install --force
          pm2 restart backend || pm2 start server.js --name backend
          pm2 save
        EOF

    # 4. Build Frontend
    - name: 🏗 Build Frontend
      run: |
        cd Client
        npm install --force
        npm run build

    # 5. Upload frontend build
    - name: 📤 Upload Frontend
      run: |
        scp -o StrictHostKeyChecking=no -r Client/build/* simran@${{ secrets.SERVER_IP }}:/var/www/frontend/

    # 6. Reload nginx
    - name: 🔁 Reload Nginx
      run: |
        ssh -o StrictHostKeyChecking=no simran@${{ secrets.SERVER_IP }} "sudo systemctl reload nginx"
